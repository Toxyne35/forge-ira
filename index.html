<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>🔥 Forge IRA 2026 - Final</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #252540;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 500px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--card); border-radius: 16px; margin-bottom: 16px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { font-size: 32px; }
.logo-text { font-size: 18px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--muted); }
.countdown { text-align: right; }
.countdown-num { font-size: 24px; font-weight: 800; color: var(--accent2); }
.countdown-label { font-size: 10px; color: var(--muted); }

.revision-timer-float { position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #1e1e3f, #2d2d5a); padding: 12px 16px; z-index: 50; display: none; }
.revision-timer-float.active { display: flex; align-items: center; justify-content: space-between; }
.revision-timer-float.warning { background: linear-gradient(135deg, #7f1d1d, #991b1b); }
.rtf-time { font-size: 24px; font-weight: 700; font-family: 'SF Mono', monospace; }
.rtf-label { font-size: 11px; color: var(--muted); }
.rtf-btn { padding: 8px 12px; border: none; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; }
.rtf-pause { background: var(--warning); color: #000; }
.rtf-resume { background: var(--success); color: #fff; }

.tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; margin-top: 60px; }
.tabs.no-timer { margin-top: 0; }
.tab { padding: 10px 12px; border: none; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.tab.active { background: var(--accent); color: #fff; }
.tab:not(.active) { background: var(--card); color: var(--muted); }

.card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.card-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }

.progress-bar { height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; }
.progress-text { font-size: 12px; color: var(--muted); text-align: right; }

.link-list { display: flex; flex-direction: column; gap: 10px; }
.link-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card2); border-radius: 12px; text-decoration: none; color: var(--text); transition: all 0.2s; }
.link-item:hover { background: rgba(124, 58, 237, 0.2); }
.link-icon { font-size: 24px; }
.link-info { flex: 1; }
.link-title { font-size: 13px; font-weight: 600; }
.link-desc { font-size: 11px; color: var(--muted); }
.link-arrow { color: var(--muted); }

.fiche { background: var(--card); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
.fiche-header { padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-left: 4px solid var(--accent); }
.fiche-icon { font-size: 28px; }
.fiche-info { flex: 1; }
.fiche-title { font-size: 15px; font-weight: 600; }
.fiche-subtitle { font-size: 11px; color: var(--muted); }
.fiche-time { font-size: 10px; color: var(--warning); margin-top: 2px; }
.fiche-toggle { font-size: 18px; color: var(--muted); transition: transform 0.2s; }
.fiche-toggle.open { transform: rotate(180deg); }
.fiche-body { display: none; padding: 0 16px 16px; }
.fiche-body.open { display: block; }
.fiche-section { margin-bottom: 16px; }
.fiche-section-title { font-size: 13px; font-weight: 600; color: var(--accent2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.fiche-content { font-size: 12px; line-height: 1.7; color: var(--text); }
.fiche-content ul { padding-left: 16px; margin: 8px 0; }
.fiche-content li { margin-bottom: 6px; }
.fiche-highlight { background: rgba(124, 58, 237, 0.2); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--accent); }
.fiche-warning { background: rgba(239, 68, 68, 0.15); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--danger); }
.fiche-tip { background: rgba(16, 185, 129, 0.15); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--success); }
.fiche-number { display: inline-block; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 11px; margin-right: 6px; }

.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.quiz-progress { font-size: 13px; color: var(--muted); }
.quiz-theme { font-size: 11px; padding: 4px 10px; background: var(--accent); border-radius: 20px; }
.quiz-question { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt { padding: 14px 16px; background: var(--card2); border: 2px solid transparent; border-radius: 12px; font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: left; color: var(--text); }
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.2); }
.quiz-opt.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.2); }
.quiz-feedback { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
.quiz-feedback.correct { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); }
.quiz-feedback.wrong { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--danger); }
.quiz-feedback strong { display: block; margin-bottom: 8px; }
.quiz-feedback .detail { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: var(--muted); }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn + .btn { margin-top: 10px; }

.timer-box { background: linear-gradient(135deg, #1e1e3f, #2d2d5a); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; }
.timer-display { font-size: 56px; font-weight: 200; font-family: 'SF Mono', 'Consolas', monospace; letter-spacing: 2px; margin: 12px 0; }
.timer-label { font-size: 13px; color: var(--muted); }
.timer-progress { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 16px; overflow: hidden; }
.timer-fill { height: 100%; background: var(--success); transition: width 1s linear; }
.timer-controls { display: flex; gap: 10px; margin-top: 16px; }
.timer-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.timer-start { background: var(--success); color: #fff; }
.timer-pause { background: var(--warning); color: #000; }
.timer-reset { background: rgba(255,255,255,0.1); color: var(--text); }

.criteria-grid { display: flex; flex-direction: column; gap: 12px; }
.criteria-item { background: var(--card2); border-radius: 12px; padding: 14px; }
.criteria-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.criteria-name { font-size: 13px; font-weight: 600; flex: 1; }
.criteria-score { display: flex; gap: 6px; }
.score-btn { width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--card); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; }
.score-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.criteria-desc { font-size: 11px; color: var(--muted); }

.result-card { text-align: center; padding: 24px; }
.result-score { font-size: 64px; font-weight: 800; }
.result-score.pass { color: var(--success); }
.result-score.fail { color: var(--danger); }
.result-label { font-size: 14px; color: var(--muted); margin-top: 8px; }
.result-detail { margin-top: 20px; text-align: left; }
.result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--card2); font-size: 13px; }

.phase-list { display: flex; flex-direction: column; gap: 10px; }
.phase-item { background: var(--card2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
.phase-item:hover { border-color: var(--accent); }
.phase-item.locked { opacity: 0.5; pointer-events: none; }
.phase-item.done { border-color: var(--success); }
.phase-icon { font-size: 24px; }
.phase-info { flex: 1; }
.phase-name { font-size: 14px; font-weight: 600; }
.phase-desc { font-size: 11px; color: var(--muted); }
.phase-status { font-size: 20px; }

.view { display: none; }
.view.active { display: block; }

.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
.modal.open { display: flex; }
.modal-content { background: var(--card); border-radius: 20px; padding: 24px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; }

.checklist { display: flex; flex-direction: column; gap: 8px; }
.check-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card2); border-radius: 10px; cursor: pointer; }
.check-box { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--muted); display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; }
.check-item.done .check-box { background: var(--success); border-color: var(--success); color: #fff; }
.check-label { font-size: 13px; flex: 1; }
.check-item.done .check-label { color: var(--success); }

.alert { padding: 12px 16px; border-radius: 10px; font-size: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.alert-warning { background: rgba(245, 158, 11, 0.15); border-left: 4px solid var(--warning); }
.alert-success { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); }
.alert-danger { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--danger); }
.alert-info { background: rgba(59, 130, 246, 0.15); border-left: 4px solid var(--info); }

.tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 4px; }
.tag-danger { background: rgba(239, 68, 68, 0.3); color: var(--danger); }
.tag-warning { background: rgba(245, 158, 11, 0.3); color: var(--warning); }
.tag-success { background: rgba(16, 185, 129, 0.3); color: var(--success); }

.mode-selector { display: flex; gap: 8px; margin-bottom: 16px; }
.mode-btn { flex: 1; padding: 16px 12px; border: 2px solid var(--card2); border-radius: 12px; background: var(--card); cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-btn:hover { border-color: var(--accent); }
.mode-btn.active { border-color: var(--accent); background: rgba(124, 58, 237, 0.2); }
.mode-btn.jour-j { border-color: var(--danger); }
.mode-btn.jour-j.active { background: rgba(239, 68, 68, 0.2); }
.mode-icon { font-size: 24px; margin-bottom: 4px; }
.mode-title { font-size: 13px; font-weight: 600; }
.mode-desc { font-size: 10px; color: var(--muted); }

.time-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.time-stat { background: var(--card2); padding: 10px; border-radius: 8px; text-align: center; }
.time-stat-value { font-size: 18px; font-weight: 700; color: var(--accent2); }
.time-stat-label { font-size: 10px; color: var(--muted); }
</style>
</head>
<body>

<div class="revision-timer-float" id="revisionTimerFloat">
  <div>
    <div class="rtf-time" id="rtfTime">02:00:00</div>
    <div class="rtf-label">⏱️ Temps de lecture restant</div>
  </div>
  <button class="rtf-btn rtf-pause" id="rtfBtn" onclick="toggleRevisionTimer()">⏸</button>
</div>

<div class="app">
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🔥</span>
      <div>
        <div class="logo-text">Forge IRA</div>
        <div class="logo-sub">Final Edition 2026</div>
      </div>
    </div>
    <div class="countdown">
      <div class="countdown-num" id="daysLeft">--</div>
      <div class="countdown-label">jours restants</div>
    </div>
  </div>

  <div class="tabs" id="mainTabs">
    <button class="tab active" onclick="showView('revisions')">📚 Révisions</button>
    <button class="tab" onclick="showView('quiz')">🎯 Quiz</button>
    <button class="tab" onclick="showView('exam')">⏱️ Épreuve</button>
    <button class="tab" onclick="showView('ressources')">🔗 Liens</button>
  </div>

  <div id="revisionsView" class="view active"></div>
  <div id="quizView" class="view"></div>
  <div id="examView" class="view"></div>
  <div id="ressourcesView" class="view"></div>
</div>

<div class="modal" id="quizModal">
  <div class="modal-content" id="quizContent"></div>
</div>

<div class="modal" id="correctionModal">
  <div class="modal-content" id="correctionContent"></div>
</div>

<div class="modal" id="timeUpModal">
  <div class="modal-content">
    <div style="text-align:center">
      <div style="font-size:48px">⏰</div>
      <div style="font-size:20px;font-weight:700;margin:12px 0">Temps écoulé !</div>
      <p style="color:var(--muted);margin-bottom:20px">Tes 2h de lecture sont terminées. Le jour J, tu passerais maintenant à la rédaction.</p>
      <div id="timeUpStats"></div>
      <button class="btn btn-primary" onclick="closeTimeUpModal()">Voir mes statistiques</button>
    </div>
  </div>
</div>

<script>
// ============ FICHES DE RÉVISION ============
const FICHES = [

// ============ RESSOURCES ============

// ============ REVISION TIMER ============
function startRevisionTimer() {
  if (revisionTimerStarted) return;
  revisionTimerStarted = true;
  revisionTimerRunning = true;
  document.getElementById('revisionTimerFloat').classList.add('active');
  document.getElementById('mainTabs').classList.remove('no-timer');
  
  revisionTimerInterval = setInterval(() => {
    if (revisionTimerRunning) {
      revisionTimerSeconds++;
      updateRevisionTimerDisplay();
      const remaining = REVISION_DURATION - revisionTimerSeconds;
      if (remaining === 3600) showAlert("⏰ Plus qu'1 heure !");
      if (remaining === 1800) showAlert("⚠️ Plus que 30 minutes !");
      if (remaining === 900) showAlert("🔥 Plus que 15 minutes !");
      if (revisionTimerSeconds >= REVISION_DURATION) endRevisionTimer();
    }
  }, 1000);
}

function updateRevisionTimerDisplay() {
  const remaining = Math.max(0, REVISION_DURATION - revisionTimerSeconds);
  const h = Math.floor(remaining / 3600);
  const m = Math.floor((remaining % 3600) / 60);
  const s = remaining % 60;
  document.getElementById('rtfTime').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (remaining < 900) document.getElementById('revisionTimerFloat').classList.add('warning');
}

function toggleRevisionTimer() {
  if (jourJMode) { showAlert("⛔ Mode Jour J : pas de pause !"); return; }
  revisionTimerRunning = !revisionTimerRunning;
  const btn = document.getElementById('rtfBtn');
  btn.textContent = revisionTimerRunning ? '⏸' : '▶';
  btn.className = revisionTimerRunning ? 'rtf-btn rtf-pause' : 'rtf-btn rtf-resume';
}

function endRevisionTimer() {
  clearInterval(revisionTimerInterval);
  revisionTimerRunning = false;
  document.getElementById('quizModal').classList.remove('open');
  document.getElementById('timeUpModal').classList.add('open');
  let statsHtml = '<div class="time-stats">';
  FICHES.forEach(f => {
    const time = state.fichesTime[f.id] || 0;
    const mins = Math.floor(time / 60);
    statsHtml += `<div class="time-stat"><div class="time-stat-value">${mins}min</div><div class="time-stat-label">${f.icon}</div></div>`;
  });
  statsHtml += '</div>';
  document.getElementById('timeUpStats').innerHTML = statsHtml;
}

function closeTimeUpModal() {
  document.getElementById('timeUpModal').classList.remove('open');
  revisionTimerStarted = false;
  revisionTimerSeconds = 0;
  document.getElementById('revisionTimerFloat').classList.remove('active', 'warning');
  renderRevisions();
}

function showAlert(msg) {
  if ('vibrate' in navigator) navigator.vibrate(200);
  alert(msg);
}

function resetRevisionTimer() {
  clearInterval(revisionTimerInterval);
  revisionTimerStarted = false;
  revisionTimerRunning = false;
  revisionTimerSeconds = 0;
  FICHES.forEach(f => state.fichesTime[f.id] = 0);
  save();
  document.getElementById('revisionTimerFloat').classList.remove('active', 'warning');
  renderRevisions();
}

// ============ COUNTDOWN ============
function updateCountdown() {
  const exam = new Date('2026-04-21T08:00:00');
  const now = new Date();
  const days = Math.ceil((exam - now) / (1000*60*60*24));
  document.getElementById('daysLeft').textContent = days > 0 ? days : '0';
}

// ============ REVISIONS ============
function renderRevisions() {
  let html = `
    <div class="mode-selector">
      <div class="mode-btn ${!jourJMode ? 'active' : ''}" onclick="setMode(false)">
        <div class="mode-icon">📚</div>
        <div class="mode-title">Entraînement</div>
        <div class="mode-desc">Pause autorisée</div>
      </div>
      <div class="mode-btn jour-j ${jourJMode ? 'active' : ''}" onclick="setMode(true)">
        <div class="mode-icon">🔥</div>
        <div class="mode-title">Mode Jour J</div>
        <div class="mode-desc">Pas de pause !</div>
      </div>
    </div>
  `;
  
  if (!revisionTimerStarted) {
    html += `
      <div class="card">
        <div class="card-title">⏱️ Session de lecture</div>
        <div class="card-subtitle">2h pour lire et mémoriser. Le timer démarre dès que tu ouvres une fiche.</div>
        <div class="time-stats">
          ${FICHES.map(f => {
            const time = state.fichesTime[f.id] || 0;
            const mins = Math.floor(time / 60);
            return `<div class="time-stat"><div class="time-stat-value">${mins}min</div><div class="time-stat-label">${f.icon}</div></div>`;
          }).join('')}
        </div>
        <button class="btn btn-danger" onclick="resetRevisionTimer()" style="margin-top:12px">🔄 Reset temps</button>
      </div>
    `;
  }
  
  FICHES.forEach(fiche => {
    const isOpen = openFiche === fiche.id;
    const isRead = state.fichesRead[fiche.id];
    const time = state.fichesTime[fiche.id] || 0;
    const mins = Math.floor(time / 60);
    
    html += `
      <div class="fiche">
        <div class="fiche-header" style="border-left-color:${fiche.color}" onclick="toggleFiche('${fiche.id}')">
          <span class="fiche-icon">${fiche.icon}</span>
          <div class="fiche-info">
            <div class="fiche-title">${fiche.title}</div>
            <div class="fiche-subtitle">${fiche.subtitle}</div>
            ${time > 0 ? `<div class="fiche-time">⏱️ ${mins}min passées</div>` : ''}
          </div>
          <span class="fiche-toggle ${isOpen ? 'open' : ''}">▼</span>
        </div>
        <div class="fiche-body ${isOpen ? 'open' : ''}">
    `;
    fiche.sections.forEach(section => {
      html += `<div class="fiche-section"><div class="fiche-section-title">${section.title}</div><div class="fiche-content">${section.content}</div></div>`;
    });
    html += `
          <button class="btn ${isRead ? 'btn-success' : 'btn-primary'}" onclick="markFicheRead('${fiche.id}')">
            ${isRead ? '✓ Fiche lue' : 'Marquer comme lue'}
          </button>
        </div>
      </div>
    `;
  });
  
  document.getElementById('revisionsView').innerHTML = html;
}

function setMode(isJourJ) { jourJMode = isJourJ; renderRevisions(); }

function toggleFiche(id) {
  if (openFiche && currentFicheStart) {
    const elapsed = Math.floor((Date.now() - currentFicheStart) / 1000);
    state.fichesTime[openFiche] = (state.fichesTime[openFiche] || 0) + elapsed;
    save();
  }
  if (openFiche === id) { openFiche = null; currentFicheStart = null; }
  else { openFiche = id; currentFicheStart = Date.now(); startRevisionTimer(); }
  renderRevisions();
}

function markFicheRead(id) { state.fichesRead[id] = true; save(); renderRevisions(); }

// ============ QUIZ ============
function renderQuiz() {
  let html = `
    <div class="card">
      <div class="card-title">🎯 Quiz de validation</div>
      <div class="card-subtitle">8 questions par thème • 70% minimum • Explications détaillées</div>
      <div class="phase-list">
  `;
  Object.keys(QUIZ_DATA).forEach(key => {
    const quiz = QUIZ_DATA[key];
    const score = state.quizScores[key] || 0;
    const total = quiz.questions.length;
    const done = state.quizDone[key];
    const ficheRead = state.fichesRead[key];
    const pct = done ? Math.round((score/total)*100) : 0;
    const locked = !ficheRead;
    html += `
      <div class="phase-item ${done ? 'done' : ''} ${locked ? 'locked' : ''}" onclick="${locked ? '' : `startQuiz('${key}')`}">
        <span class="phase-icon">${quiz.icon}</span>
        <div class="phase-info">
          <div class="phase-name">${quiz.name}</div>
          <div class="phase-desc">${locked ? '🔒 Lis la fiche' : (done ? `${score}/${total} (${pct}%)` : `${total} questions`)}</div>
        </div>
        <span class="phase-status">${locked ? '🔒' : (done ? (pct >= 70 ? '✅' : '🔄') : '▶️')}</span>
      </div>
    `;
  });
  html += '</div></div>';
  document.getElementById('quizView').innerHTML = html;
}

function startQuiz(key) {
  currentQuiz = key;
  quizQuestions = [...QUIZ_DATA[key].questions].sort(() => Math.random() - 0.5);
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  renderQuizQuestion();
  document.getElementById('quizModal').classList.add('open');
}

function renderQuizQuestion() {
  const data = QUIZ_DATA[currentQuiz];
  const q = quizQuestions[quizIndex];
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-header">
      <span class="quiz-progress">${quizIndex + 1}/${quizQuestions.length}</span>
      <span class="quiz-theme" style="background:${data.color}">${data.name}</span>
    </div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">
      ${q.opts.map((opt, i) => `<button class="quiz-opt" onclick="selectAnswer(${i})">${opt}</button>`).join('')}
    </div>
    <div id="quizFeedback"></div>
  `;
}

function selectAnswer(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIndex];
  document.querySelectorAll('.quiz-opt').forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (i === q.ans) opt.classList.add('correct');
    if (i === idx && idx !== q.ans) opt.classList.add('wrong');
  });
  if (idx === q.ans) quizScore++;
  
  document.getElementById('quizFeedback').innerHTML = `
    <div class="quiz-feedback ${idx === q.ans ? 'correct' : 'wrong'}">
      <strong>${idx === q.ans ? '✓ Bonne réponse !' : '✗ Mauvaise réponse'}</strong>
      ${q.tip}
      ${q.detail ? `<div class="detail">${q.detail}</div>` : ''}
    </div>
    <button class="btn btn-primary" onclick="nextQuestion()" style="margin-top:12px">
      ${quizIndex < quizQuestions.length - 1 ? 'Question suivante →' : 'Voir mon résultat'}
    </button>
  `;
}

function nextQuestion() {
  quizIndex++;
  quizAnswered = false;
  if (quizIndex >= quizQuestions.length) showQuizResult();
  else renderQuizQuestion();
}

function showQuizResult() {
  const total = quizQuestions.length;
  const pct = Math.round((quizScore / total) * 100);
  state.quizScores[currentQuiz] = quizScore;
  state.quizDone[currentQuiz] = true;
  save();
  document.getElementById('quizContent').innerHTML = `
    <div class="result-card">
      <div class="result-score ${pct >= 70 ? 'pass' : 'fail'}">${quizScore}/${total}</div>
      <div class="result-label">${pct}%</div>
      <div style="font-size:48px;margin:16px 0">${pct >= 70 ? '🎉' : '📚'}</div>
      <p style="color:var(--muted);margin-bottom:20px">${pct >= 70 ? 'Thème validé ! Tu maîtrises les bases.' : '70% requis. Relis la fiche et réessaie.'}</p>
      <button class="btn ${pct >= 70 ? 'btn-success' : 'btn-warning'}" onclick="closeQuiz()">${pct >= 70 ? 'Continuer' : 'Réviser'}</button>
      ${pct < 70 ? `<button class="btn btn-outline" onclick="startQuiz('${currentQuiz}')">Réessayer</button>` : ''}
    </div>
  `;
}

function closeQuiz() { document.getElementById('quizModal').classList.remove('open'); renderQuiz(); }

// ============ EXAM ============
function renderExam() {
  const allPassed = Object.keys(QUIZ_DATA).every(k => state.quizDone[k] && (state.quizScores[k] / QUIZ_DATA[k].questions.length) >= 0.7);
  let html = '';
  
  if (!allPassed && !currentExam) {
    html = `<div class="alert alert-danger"><span>🔒</span><span>Valide tous les quiz (70%) avant les annales</span></div>`;
    html += '<div class="card"><div class="card-title">📊 Prérequis</div><div class="checklist">';
    Object.keys(QUIZ_DATA).forEach(k => {
      const q = QUIZ_DATA[k];
      const s = state.quizScores[k] || 0;
      const t = q.questions.length;
      const ok = state.quizDone[k] && (s/t) >= 0.7;
      html += `<div class="check-item ${ok ? 'done' : ''}" onclick="showView('quiz')"><div class="check-box">${ok ? '✓' : ''}</div><span class="check-label">${q.icon} ${q.name}</span></div>`;
    });
    html += '</div></div>';
  } else if (currentExam) {
    const exam = EXAMS.find(e => e.id === currentExam);
    const rem = Math.max(0, exam.duration - timerSeconds);
    const h = Math.floor(rem / 3600);
    const m = Math.floor((rem % 3600) / 60);
    const s = rem % 60;
    const pct = Math.min(100, (timerSeconds / exam.duration) * 100);
    html = `
      ${rem < 1800 ? '<div class="alert alert-danger"><span>⏰</span><span>Moins de 30min !</span></div>' : ''}
      <div class="timer-box">
        <div class="timer-label">${exam.title}</div>
        <div class="timer-display">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
        <div class="timer-progress"><div class="timer-fill" style="width:${pct}%;background:${rem < 1800 ? 'var(--danger)' : 'var(--success)'}"></div></div>
        <div class="timer-controls">
          <button class="timer-btn ${timerRunning ? 'timer-pause' : 'timer-start'}" onclick="toggleExamTimer()">${timerRunning ? '⏸' : '▶'}</button>
          <button class="timer-btn timer-reset" onclick="finishExam()">✓ Terminer</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📝 Checklist</div>
        <div class="checklist">
          <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span class="check-label">Introduction</span></div>
          <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span class="check-label">Diagnostic</span></div>
          <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span class="check-label">Propositions</span></div>
          <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span class="check-label">Annexe 1</span></div>
          <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span class="check-label">Annexe 2</span></div>
          <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span class="check-label">Relecture</span></div>
        </div>
      </div>
    `;
  } else {
    html = `<div class="alert alert-success"><span>✅</span><span>Quiz validés ! Prêt pour les annales.</span></div>`;
    html += '<div class="card"><div class="card-title">⏱️ Épreuves 4h</div><div class="phase-list">';
    EXAMS.forEach(exam => {
      const done = state.examsDone[exam.id];
      const score = state.examScores[exam.id];
      html += `
        <div class="phase-item ${done ? 'done' : ''}">
          <span class="phase-icon">📄</span>
          <div class="phase-info">
            <div class="phase-name">${exam.title}</div>
            <div class="phase-desc">${exam.subject}${done ? ` • ${score}/20` : ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:-4px;margin-bottom:12px">
          <a href="${exam.url}" target="_blank" class="btn btn-outline" style="flex:1;text-align:center;text-decoration:none;padding:10px;font-size:12px">📥 PDF</a>
          <button class="btn btn-warning" style="flex:1;font-size:12px" onclick="startExam('${exam.id}')">⏱️ Go</button>
        </div>
      `;
    });
    html += '</div></div>';
  }
  document.getElementById('examView').innerHTML = html;
}

function startExam(id) {
  currentExam = id;
  timerSeconds = 0;
  timerRunning = true;
  state.criteriaScores[id] = {};
  save();
  timerInterval = setInterval(() => {
    if (timerRunning) {
      timerSeconds++;
      renderExam();
      if (timerSeconds >= EXAMS.find(e => e.id === currentExam).duration) finishExam();
    }
  }, 1000);
  renderExam();
}

function toggleExamTimer() { timerRunning = !timerRunning; renderExam(); }

function finishExam() { clearInterval(timerInterval); timerRunning = false; showCorrection(); }

function showCorrection() {
  if (!state.criteriaScores[currentExam]) state.criteriaScores[currentExam] = {};
  let html = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:32px">📋</div>
      <div style="font-size:18px;font-weight:700">Correction Jury</div>
    </div>
    <div class="alert alert-warning"><span>⚠️</span><span>Évalue honnêtement !</span></div>
    <div class="criteria-grid">
  `;
  JURY_CRITERIA.forEach(c => {
    const s = state.criteriaScores[currentExam][c.id] ?? -1;
    html += `
      <div class="criteria-item">
        <div class="criteria-header">
          <span class="criteria-name">${c.name}</span>
          <div class="criteria-score">
            ${[0,1,2].map(v => `<button class="score-btn ${s===v?'active':''}" onclick="setScore('${c.id}',${v})">${v}</button>`).join('')}
          </div>
        </div>
        <div class="criteria-desc">${c.desc}</div>
      </div>
    `;
  });
  html += `
    </div>
    <button class="btn btn-success" onclick="calcScore()" style="margin-top:16px">📊 Ma note</button>
    <button class="btn btn-outline" onclick="closeCorrection()">Annuler</button>
  `;
  document.getElementById('correctionContent').innerHTML = html;
  document.getElementById('correctionModal').classList.add('open');
}

function setScore(id, val) { state.criteriaScores[currentExam][id] = val; save(); showCorrection(); }

function calcScore() {
  const scores = state.criteriaScores[currentExam];
  if (!JURY_CRITERIA.every(c => scores[c.id] >= 0)) { alert('Évalue tous les critères !'); return; }
  let total = 0;
  JURY_CRITERIA.forEach(c => total += scores[c.id]);
  state.examScores[currentExam] = total;
  state.examsDone[currentExam] = true;
  save();
  let html = `
    <div class="result-card">
      <div class="result-score ${total >= 10 ? 'pass' : 'fail'}">${total}/20</div>
      <div style="font-size:40px;margin:16px 0">${total < 5 ? '⛔' : (total >= 10 ? '✅' : '📚')}</div>
      <p style="color:var(--muted);margin-bottom:20px">${total < 5 ? 'Éliminatoire !' : (total < 10 ? 'Sous la moyenne' : (total < 14 ? 'Correct !' : 'Excellent !'))}</p>
      <div class="result-detail">
        ${JURY_CRITERIA.map(c => {
          const s = scores[c.id];
          const col = s === 0 ? 'var(--danger)' : (s === 1 ? 'var(--warning)' : 'var(--success)');
          return `<div class="result-item"><span>${c.name}</span><span style="color:${col};font-weight:600">${s}/2</span></div>`;
        }).join('')}
      </div>
      <button class="btn btn-primary" onclick="closeAndReturn()" style="margin-top:20px">Terminer</button>
    </div>
  `;
  document.getElementById('correctionContent').innerHTML = html;
}

function closeCorrection() { document.getElementById('correctionModal').classList.remove('open'); }
function closeAndReturn() { currentExam = null; timerSeconds = 0; document.getElementById('correctionModal').classList.remove('open'); renderExam(); }

// ============ RESSOURCES ============
function renderRessources() {
  let html = '';
  RESSOURCES.forEach(cat => {
    html += `<div class="card"><div class="card-title">${cat.category}</div><div class="link-list">`;
    cat.links.forEach(l => {
      html += `<a href="${l.url}" target="_blank" class="link-item"><span class="link-icon">${l.icon}</span><div class="link-info"><div class="link-title">${l.title}</div><div class="link-desc">${l.desc}</div></div><span class="link-arrow">→</span></a>`;
    });
    html += '</div></div>';
  });
  document.getElementById('ressourcesView').innerHTML = html;
}

// ============ NAV ============
function showView(view) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['revisions','quiz','exam','ressources'][i] === view));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(view + 'View').classList.add('active');
}

// ============ INIT ============
updateCountdown();
document.getElementById('mainTabs').classList.add('no-timer');
renderRevisions();
renderQuiz();
renderExam();
renderRessources();
</script>
</body>
</html>
