<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔥 Forge IRA 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #252540;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 500px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--card); border-radius: 16px; margin-bottom: 16px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { font-size: 32px; }
.logo-text { font-size: 18px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--muted); }
.countdown { text-align: right; }
.countdown-num { font-size: 24px; font-weight: 800; color: var(--accent2); }
.countdown-label { font-size: 10px; color: var(--muted); }

.tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
.tab { flex: 1; min-width: 70px; padding: 12px 8px; border: none; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.tab.active { background: var(--accent); color: #fff; }
.tab:not(.active) { background: var(--card); color: var(--muted); }

.card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.card-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

.fiche { background: var(--card); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
.fiche-header { padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-left: 4px solid var(--accent); }
.fiche-icon { font-size: 28px; }
.fiche-info { flex: 1; }
.fiche-title { font-size: 15px; font-weight: 600; }
.fiche-subtitle { font-size: 11px; color: var(--muted); }
.fiche-toggle { font-size: 18px; color: var(--muted); }
.fiche-body { display: none; padding: 0 16px 16px; }
.fiche-body.open { display: block; }
.fiche-content { font-size: 12px; line-height: 1.7; }
.fiche-content ul { padding-left: 16px; margin: 8px 0; }
.fiche-highlight { background: rgba(124, 58, 237, 0.2); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--accent); }
.fiche-warning { background: rgba(239, 68, 68, 0.15); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--danger); }
.fiche-tip { background: rgba(16, 185, 129, 0.15); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--success); }

.phase-list { display: flex; flex-direction: column; gap: 10px; }
.phase-item { background: var(--card2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 2px solid transparent; }
.phase-item:hover { border-color: var(--accent); }
.phase-item.done { border-color: var(--success); }
.phase-item.locked { opacity: 0.5; }
.phase-icon { font-size: 24px; }
.phase-info { flex: 1; }
.phase-name { font-size: 14px; font-weight: 600; }
.phase-desc { font-size: 11px; color: var(--muted); }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
.btn + .btn { margin-top: 10px; }

.link-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card2); border-radius: 12px; text-decoration: none; color: var(--text); margin-bottom: 10px; }
.link-icon { font-size: 24px; }
.link-info { flex: 1; }
.link-title { font-size: 13px; font-weight: 600; }
.link-desc { font-size: 11px; color: var(--muted); }

.quiz-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
.quiz-progress { font-size: 13px; color: var(--muted); }
.quiz-theme { font-size: 11px; padding: 4px 10px; background: var(--accent); border-radius: 20px; }
.quiz-question { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
.quiz-opt { display: block; width: 100%; padding: 14px 16px; background: var(--card2); border: 2px solid transparent; border-radius: 12px; font-size: 13px; cursor: pointer; text-align: left; color: var(--text); margin-bottom: 10px; }
.quiz-opt.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.2); }
.quiz-opt.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.2); }
.quiz-feedback { padding: 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; margin-top: 16px; }
.quiz-feedback.correct { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); }
.quiz-feedback.wrong { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--danger); }
.quiz-feedback .detail { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: var(--accent2); }

.timer-box { background: linear-gradient(135deg, #1e1e3f, #2d2d5a); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; }
.timer-display { font-size: 48px; font-weight: 200; font-family: monospace; margin: 12px 0; }
.timer-label { font-size: 13px; color: var(--muted); }
.timer-controls { display: flex; gap: 10px; margin-top: 16px; }
.timer-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.timer-start { background: var(--success); color: #fff; }
.timer-pause { background: var(--warning); color: #000; }

.editor-zone { margin-top: 16px; }
.editor-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; color: var(--accent2); }
.editor {
  width: 100%;
  min-height: 200px;
  padding: 12px;
  background: var(--card2);
  border: 2px solid var(--accent);
  border-radius: 10px;
  color: var(--text);
  font-size: 13px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  resize: vertical;
  line-height: 1.6;
}
.editor:focus { outline: none; border-color: var(--accent2); }
.char-info { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; margin-bottom: 12px; }

.annale-select {
  width: 100%;
  padding: 12px;
  background: var(--card2);
  border: 2px solid var(--accent);
  border-radius: 10px;
  color: var(--text);
  font-size: 13px;
  margin-bottom: 16px;
  cursor: pointer;
}
.annale-select:focus { outline: none; border-color: var(--accent2); }
.annale-select option { background: #1a1a2e; }

.result-card { text-align: center; padding: 24px; }
.result-score { font-size: 64px; font-weight: 800; }
.result-score.pass { color: var(--success); }
.result-score.fail { color: var(--danger); }

.alert { padding: 12px 16px; border-radius: 10px; font-size: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.alert-warning { background: rgba(245, 158, 11, 0.15); border-left: 4px solid var(--warning); }
.alert-success { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); }
.alert-info { background: rgba(124, 58, 237, 0.15); border-left: 4px solid var(--accent); }

.view { display: none; }
.view.active { display: block; }

.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
.modal.open { display: flex; }
.modal-content { background: var(--card); border-radius: 20px; padding: 24px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; }

.feedback-block { background: var(--card2); border-radius: 12px; padding: 14px; margin: 12px 0; border-left: 4px solid var(--accent); }
.feedback-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.feedback-list { font-size: 12px; line-height: 1.8; }

.copy-zone { background: var(--card2); border-radius: 10px; padding: 16px; margin-top: 12px; }
.copy-textarea { width: 100%; height: 120px; background: #0f0f1a; border: 1px solid var(--accent); border-radius: 8px; color: var(--text); font-size: 10px; padding: 8px; font-family: monospace; resize: none; }
</style>
</head>

function renderMethodo() {
  let html = '';
  FICHES.forEach(f => {
    const isOpen = openFiche === f.id;
    html += `<div class="fiche">
      <div class="fiche-header" style="border-left-color:${f.color}" onclick="toggleFiche('${f.id}')">
        <span class="fiche-icon">${f.icon}</span>
        <div class="fiche-info"><div class="fiche-title">${f.title}</div><div class="fiche-subtitle">${f.subtitle}</div></div>
        <span class="fiche-toggle">${isOpen ? '▲' : '▼'}</span>
      </div>
      <div class="fiche-body ${isOpen ? 'open' : ''}">
        ${f.sections.map(s => `<h4 style="margin:16px 0 8px;color:var(--accent2)">${s.title}</h4><div class="fiche-content">${s.content}</div>`).join('')}
        <button class="btn ${state.read[f.id] ? 'btn-success' : 'btn-primary'}" onclick="markRead('${f.id}')" style="margin-top:16px">${state.read[f.id] ? '✓ Lue' : 'Marquer lue'}</button>
      </div>
    </div>`;
  });
  document.getElementById('methodo').innerHTML = html;
}

function toggleFiche(id) { openFiche = openFiche === id ? null : id; renderMethodo(); }
function markRead(id) { state.read[id] = true; save(); renderMethodo(); }

// ===== QUIZ =====
function renderQuiz() {
  let html = `<div class="card"><div class="card-title">🎯 Quiz — 12 questions par thème</div>
    <div class="card-subtitle">6 thèmes × 12 questions = 72 total</div><div class="phase-list">`;
  Object.keys(QUIZ_DATA).forEach(k => {
    const q = QUIZ_DATA[k], total = q.questions.length, score = state.scores[k] || 0, done = state.done[k];
    const pct = done ? Math.round(score/total*100) : 0;
    html += `<div class="phase-item ${done ? 'done' : ''}" onclick="startQuiz('${k}')">
      <span class="phase-icon">${q.icon}</span>
      <div class="phase-info"><div class="phase-name">${q.name}</div>
      <div class="phase-desc">${done ? `${score}/${total} (${pct}%)` : `${total} questions`}</div></div>
      <span>${done ? (pct >= 70 ? '✅' : '🔄') : '▶️'}</span>
    </div>`;
  });
  html += '</div></div>';
  document.getElementById('quiz').innerHTML = html;
}

function startQuiz(k) {
  currentQuiz = k;
  quizQ = [...QUIZ_DATA[k].questions].sort(() => Math.random() - 0.5);
  quizIdx = quizScore = 0;
  quizAnswered = false;
  showQuestion();
  document.getElementById('quizModal').classList.add('open');
}

function showQuestion() {
  const q = quizQ[quizIdx];
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-header"><span class="quiz-progress">${quizIdx+1}/${quizQ.length}</span><span class="quiz-theme">${QUIZ_DATA[currentQuiz].name}</span></div>
    <div class="quiz-question">${q.q}</div>
    ${q.o.map((opt, i) => `<button class="quiz-opt" onclick="answer(${i})">${opt}</button>`).join('')}
    <div id="feedback"></div>`;
}

function answer(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQ[quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((b, j) => {
    b.style.pointerEvents = 'none';
    if (j === q.a) b.classList.add('correct');
    if (j === i && i !== q.a) b.classList.add('wrong');
  });
  if (i === q.a) quizScore++;
  document.getElementById('feedback').innerHTML = `
    <div class="quiz-feedback ${i === q.a ? 'correct' : 'wrong'}">
      <strong>${i === q.a ? '✓ Correct !' : '✗ Incorrect'}</strong><br>${q.t}
    </div>
    <button class="btn btn-primary" onclick="nextQ()" style="margin-top:12px">${quizIdx < quizQ.length - 1 ? 'Suivant →' : 'Résultat'}</button>`;
}

function nextQ() {
  quizIdx++;
  quizAnswered = false;
  if (quizIdx >= quizQ.length) {
    const total = quizQ.length, pct = Math.round(quizScore/total*100);
    state.scores[currentQuiz] = quizScore;
    state.done[currentQuiz] = true;
    save();
    document.getElementById('quizContent').innerHTML = `
      <div class="result-card">
        <div class="result-score ${pct >= 70 ? 'pass' : 'fail'}">${quizScore}/${total}</div>
        <p style="color:var(--muted);margin:16px 0">${pct}% — ${pct >= 70 ? '✅ Validé !' : '70% recommandé'}</p>
        <button class="btn btn-primary" onclick="closeQuiz()">Fermer</button>
        ${pct < 70 ? `<button class="btn btn-outline" onclick="startQuiz('${currentQuiz}')">Réessayer</button>` : ''}
      </div>`;
  } else showQuestion();
}

function closeQuiz() { document.getElementById('quizModal').classList.remove('open'); renderQuiz(); }

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ✅ Met à jour SEULEMENT l'affichage du timer
function updateTimerDisplay() {
  const h = Math.floor(simTime / 3600), m = Math.floor((simTime % 3600) / 60), s = simTime % 60;
  const el = document.getElementById('timerDisplay');
  if (el) {
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    // Alerte couleur si >3h30
    el.style.color = simTime >= 3.5*3600 ? 'var(--danger)' : simTime >= 3*3600 ? 'var(--warning)' : 'var(--text)';
  }
}

// ✅ Met à jour seulement les boutons du timer
function updateTimerButtons() {
  const ctrl = document.getElementById('timerControls');
  if (!ctrl) return;
  if (!simRunning) {
    ctrl.innerHTML = `<button class="timer-btn timer-start" onclick="startSim()">▶ Démarrer</button>
      ${simTime > 0 ? `<button class="timer-btn" style="background:var(--danger);color:#fff" onclick="stopSim()">⏹ Réinitialiser</button>` : ''}`;
  } else {
    ctrl.innerHTML = `<button class="timer-btn timer-pause" onclick="pauseSim()">⏸ Pause</button>
      <button class="timer-btn" style="background:var(--danger);color:#fff" onclick="stopSim()">⏹ Arrêter</button>`;
  }
}

function startSim() {
  simRunning = true;
  simInt = setInterval(() => {
    simTime++;
    updateTimerDisplay(); // ✅ PAS renderSimulateur() !
    if (simTime >= 4*60*60) {
      pauseSim();
      alert('⏰ 4h écoulées ! Temps écoulé.');
    }
  }, 1000);
  updateTimerButtons();
}

function pauseSim() {
  simRunning = false;
  clearInterval(simInt);
  saveDraftSilent(); // ✅ Sauvegarde silencieuse
  updateTimerButtons();
}

function stopSim() {
  simRunning = false;
  clearInterval(simInt);
  saveDraftSilent();
  simTime = 0;
  updateTimerDisplay();
  updateTimerButtons();
}

function updateCounts() {
  const n = document.getElementById('noteEditor');
  const d1 = document.getElementById('doc1Editor');
  const d2 = document.getElementById('doc2Editor');
  if (n) document.getElementById('noteCount').textContent = n.value.length;
  if (d1) document.getElementById('doc1Count').textContent = d1.value.length;
  if (d2) document.getElementById('doc2Count').textContent = d2.value.length;
}

function saveAnnale() {
  const sel = document.getElementById('annaleSelect');
  if (sel) { state.draft.annale = sel.value; save(); }
}

// ✅ Sauvegarde silencieuse (sans alert)
function saveDraftSilent() {
  const n = document.getElementById('noteEditor');
  const d1 = document.getElementById('doc1Editor');
  const d2 = document.getElementById('doc2Editor');
  const sel = document.getElementById('annaleSelect');
  if (n) {
    state.draft = {
      note: n.value,
      doc1: d1 ? d1.value : (state.draft.doc1 || ''),
      doc2: d2 ? d2.value : (state.draft.doc2 || ''),
      annale: sel ? sel.value : (state.draft.annale || ''),
      time: simTime
    };
    save();
  }
}

function saveDraft() {
  saveDraftSilent();
  const btn = document.querySelector('.btn-outline');
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.textContent = '✅ Sauvegardé !'; btn.style.background = 'var(--success)'; btn.style.color = '#fff'; }
  setTimeout(() => { if (btn) { btn.textContent = orig; btn.style.background = ''; btn.style.color = ''; } }, 2000);
}

// ✅ NOUVEAU : Copier le texte formaté pour correction par ymani
function copyForCorrection() {
  const note = document.getElementById('noteEditor').value;
  const doc1 = document.getElementById('doc1Editor').value;
  const doc2 = document.getElementById('doc2Editor').value;
  const sel = document.getElementById('annaleSelect');
  const annale = sel ? sel.options[sel.selectedIndex].text : 'Annale non précisée';
  const annaleVal = sel ? sel.value : '';

  if (!note.trim()) { alert('❌ Ta note est vide ! Rédige ta note avant de demander une correction.'); return; }

  saveDraftSilent();

  const h = Math.floor(simTime / 3600), m = Math.floor((simTime % 3600) / 60);
  const tempsRedaction = simTime > 0 ? `${h}h${String(m).padStart(2,'0')}` : 'Non chronométré';

  const texte = `==== CORRECTION IRA — DEMANDE DE NOTATION ====
📌 ANNALE : ${annaleVal || annale}
⏱️ Temps de rédaction : ${tempsRedaction}

------- NOTE ARGUMENTÉE -------
${note}

------- DOCUMENT ANNEXE 1 -------
${doc1 || '(non rédigé)'}

------- DOCUMENT ANNEXE 2 -------
${doc2 || '(non rédigé)'}

------- FIN DU DEVOIR -------
Corrige ce devoir selon la grille officielle IRA (5 critères) :
1. Qualités rédactionnelles /5
2. Capacité d'analyse et de synthèse /5
3. Pertinence des propositions /5
4. Argumentation structurée /3
5. Documents annexes opérationnels /2
Note totale /20 + points forts + axes d'amélioration + conseils.`;

  // Copie dans le presse-papiers
  if (navigator.clipboard) {
    navigator.clipboard.writeText(texte).then(() => {
      showCopySuccess();
    }).catch(() => {
      showCopyFallback(texte);
    });
  } else {
    showCopyFallback(texte);
  }
}

function showCopySuccess() {
  const zone = document.getElementById('copyZone');
  if (zone) zone.style.display = 'none';
  document.getElementById('correctionContent').innerHTML = `
    <div style="text-align:center;padding:20px">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <p style="font-size:16px;font-weight:700;margin-bottom:12px">Copié dans le presse-papiers !</p>
      <div style="background:var(--card2);border-radius:12px;padding:16px;text-align:left;font-size:12px;line-height:1.8;color:var(--muted)">
        <strong style="color:var(--accent2)">Comment obtenir la correction :</strong><br>
        1️⃣ Va dans le chat avec <strong>ymani</strong><br>
        2️⃣ Colle le texte (Cmd+V / Ctrl+V)<br>
        3️⃣ Envoie le message<br>
        4️⃣ ymani corrigera selon la grille officielle IRA
      </div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="closeCorrection()">Fermer</button>
    </div>`;
  document.getElementById('correctionModal').classList.add('open');
}

function showCopyFallback(texte) {
  const zone = document.getElementById('copyZone');
  const ta = document.getElementById('copyTextarea');
  if (zone && ta) {
    ta.value = texte;
    zone.style.display = 'block';
    ta.select();
  }
}

function closeCorrection() { document.getElementById('correctionModal').classList.remove('open'); }

function resetAll() {
  if (confirm("Effacer toute ta progression et les brouillons ?")) {
    localStorage.removeItem('forge-ira-v7');
    location.reload();
  }
}

  document.getElementById('daysLeft').textContent = days > 0 ? days : '0';
  render();
