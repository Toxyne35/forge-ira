<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔥 Forge IRA 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #252540;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 500px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--card); border-radius: 16px; margin-bottom: 16px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { font-size: 32px; }
.logo-text { font-size: 18px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--muted); }
.countdown { text-align: right; }
.countdown-num { font-size: 24px; font-weight: 800; color: var(--accent2); }
.countdown-label { font-size: 10px; color: var(--muted); }

.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab { flex: 1; padding: 12px 8px; border: none; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.tab.active { background: var(--accent); color: #fff; }
.tab:not(.active) { background: var(--card); color: var(--muted); }

.card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.card-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

.fiche { background: var(--card); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
.fiche-header { padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-left: 4px solid var(--accent); }
.fiche-icon { font-size: 28px; }
.fiche-info { flex: 1; }
.fiche-title { font-size: 15px; font-weight: 600; }
.fiche-subtitle { font-size: 11px; color: var(--muted); }
.fiche-toggle { font-size: 18px; color: var(--muted); }
.fiche-body { display: none; padding: 0 16px 16px; }
.fiche-body.open { display: block; }
.fiche-content { font-size: 12px; line-height: 1.7; }
.fiche-content ul { padding-left: 16px; margin: 8px 0; }
.fiche-highlight { background: rgba(124, 58, 237, 0.2); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--accent); }
.fiche-warning { background: rgba(239, 68, 68, 0.15); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--danger); }
.fiche-tip { background: rgba(16, 185, 129, 0.15); padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 3px solid var(--success); }

.phase-list { display: flex; flex-direction: column; gap: 10px; }
.phase-item { background: var(--card2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 2px solid transparent; }
.phase-item:hover { border-color: var(--accent); }
.phase-item.done { border-color: var(--success); }
.phase-item.locked { opacity: 0.5; }
.phase-icon { font-size: 24px; }
.phase-info { flex: 1; }
.phase-name { font-size: 14px; font-weight: 600; }
.phase-desc { font-size: 11px; color: var(--muted); }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
.btn + .btn { margin-top: 10px; }

.link-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card2); border-radius: 12px; text-decoration: none; color: var(--text); margin-bottom: 10px; }
.link-icon { font-size: 24px; }
.link-info { flex: 1; }
.link-title { font-size: 13px; font-weight: 600; }
.link-desc { font-size: 11px; color: var(--muted); }

.quiz-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
.quiz-progress { font-size: 13px; color: var(--muted); }
.quiz-theme { font-size: 11px; padding: 4px 10px; background: var(--accent); border-radius: 20px; }
.quiz-question { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
.quiz-opt { display: block; width: 100%; padding: 14px 16px; background: var(--card2); border: 2px solid transparent; border-radius: 12px; font-size: 13px; cursor: pointer; text-align: left; color: var(--text); margin-bottom: 10px; }
.quiz-opt.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.2); }
.quiz-opt.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.2); }
.quiz-feedback { padding: 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; margin-top: 16px; }
.quiz-feedback.correct { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); }
.quiz-feedback.wrong { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--danger); }
.quiz-feedback .detail { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: var(--accent2); }

.timer-box { background: linear-gradient(135deg, #1e1e3f, #2d2d5a); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; }
.timer-display { font-size: 48px; font-weight: 200; font-family: monospace; margin: 12px 0; }
.timer-label { font-size: 13px; color: var(--muted); }
.timer-controls { display: flex; gap: 10px; margin-top: 16px; }
.timer-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.timer-start { background: var(--success); color: #fff; }
.timer-pause { background: var(--warning); color: #000; }

.criteria-item { background: var(--card2); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.criteria-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.criteria-name { font-size: 13px; font-weight: 600; }
.criteria-score { display: flex; gap: 6px; }
.score-btn { width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--card); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; }
.score-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.criteria-desc { font-size: 11px; color: var(--muted); }

.result-card { text-align: center; padding: 24px; }
.result-score { font-size: 64px; font-weight: 800; }
.result-score.pass { color: var(--success); }
.result-score.fail { color: var(--danger); }

.checklist { display: flex; flex-direction: column; gap: 8px; }
.check-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card2); border-radius: 10px; cursor: pointer; }
.check-box { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--muted); display: flex; align-items: center; justify-content: center; }
.check-item.done .check-box { background: var(--success); border-color: var(--success); color: #fff; }

.alert { padding: 12px 16px; border-radius: 10px; font-size: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.alert-warning { background: rgba(245, 158, 11, 0.15); border-left: 4px solid var(--warning); }
.alert-success { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); }

.view { display: none; }
.view.active { display: block; }

.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
.modal.open { display: flex; }
.modal-content { background: var(--card); border-radius: 20px; padding: 24px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; }

.tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 4px; }
.tag-danger { background: rgba(239, 68, 68, 0.3); color: var(--danger); }
</style>
</head>
<body>

<div class="app">

    { q: "Choc des savoirs 2024 = ?", o: ["Suppression bac", "Groupes de niveau", "Nouveau diplôme", "Fin devoirs"], a: 1, t: "Groupes de niveau en français/maths 6è-5è. Mesure controversée.", d: "📊 Groupes niveau" },
    { q: "Bacheliers Parcoursup/an ?", o: ["300k", "500k", "660k", "900k"], a: 2, t: "~660 000 pour 21 000 formations. 10 vœux max.", d: "🎓 660k bacheliers" },
    { q: "Nombre d'académies ?", o: ["18", "26", "30", "36"], a: 2, t: "30 : 26 métropole + 4 outre-mer. 1 recteur chacune.", d: "🗺️ 30 académies" },
    { q: "PISA 2023 France ?", o: ["Amélioration", "Recul", "Stagnation", "1ère place"], a: 1, t: "RECUL en maths et lecture. Inégalités sociales record.", d: "📉 Recul + inégalités" },
    { q: "Instruction obligatoire de ?", o: ["3 à 16 ans", "6 à 16 ans", "3 à 18 ans", "6 à 18 ans"], a: 2, t: "3 ans (2019) → 18 ans (2020). Obligation formation.", d: "📚 3 → 18 ans" },
    { q: "Postes enseignants vacants ?", o: ["500", "1500", "4000", "10000"], a: 2, t: "~4000/an. Crise attractivité : salaires, conditions.", d: "⚠️ 4000 vacants" },
    { q: "Qui nomme les recteurs ?", o: ["Ministre", "Président en Conseil ministres", "Premier ministre", "Élus"], a: 1, t: "Décret PRÉSIDENTIEL en Conseil des ministres.", d: "🏛️ Décret PR" },
    { q: "DNB 2024 devient ?", o: ["Facultatif", "Obligatoire pour lycée", "Supprimé", "Indicatif"], a: 1, t: "Sans brevet = pas de seconde GT. Redoublement ou pro.", d: "🎯 DNB obligatoire" },
    { q: "Le socle commun comprend ?", o: ["3 domaines", "5 domaines", "8 domaines", "10 domaines"], a: 1, t: "5 domaines : langages, méthodes, citoyenneté, systèmes, représentations.", d: "📝 5 domaines" },
    { q: "Qui dirige une académie ?", o: ["Préfet", "Recteur", "DASEN", "Maire"], a: 1, t: "RECTEUR = académie. DASEN = département.", d: "🏫 Recteur" },
    { q: "Réforme lycée pro 2023 ?", o: ["Moins de stages", "Plus de stages", "Fusion avec général", "Suppression"], a: 1, t: "Plus de stages, meilleure insertion, gratification.", d: "🔧 + stages" },
    { q: "Plan harcèlement date ?", o: ["2021", "2022", "2023", "2024"], a: 2, t: "Plan 2023 : pHARe, questionnaires, numéro 3018.", d: "🛡️ 2023 pHARe" }
  ]}
};

const EXAMS = [
  { id: "2024", title: "Annale 2024", subject: "Harcèlement scolaire", url: "https://www.fonction-publique.gouv.fr/files/files/devenir-agent-public/cas_pratique_ira_2024.pdf" },
  { id: "2023", title: "Annale 2023", subject: "Titres d'identité", url: "https://www.fonction-publique.gouv.fr/files/files/Devenir%20agent%20public/IRA/Annales/2023-2/Sujet_cas_pratique_IRA_2023-2.pdf" }
];

const JURY = [
  { id: "dossier", name: "Utilisation dossier" },
  { id: "connaissances", name: "Connaissances hors dossier" },
  { id: "commande", name: "Réponse commande" },
  { id: "problematique", name: "Problématique" },
  { id: "decision", name: "Esprit décision" },
  { id: "annexes", name: "Qualité annexes" },
  { id: "redaction", name: "Rédaction" },
  { id: "methode", name: "Méthode" },
  { id: "destinataire", name: "Destinataire" },
  { id: "presentation", name: "Présentation" }
];

const LIENS = [
  { icon: "📋", title: "Annales", desc: "Tous les sujets", url: "https://www.fonction-publique.gouv.fr/devenir-agent-public/les-annales-des-concours" },
  { icon: "🏆", title: "Meilleures copies", desc: "Exemples notés", url: "https://www.fonction-publique.gouv.fr/devenir-agent-public/les-meilleures-copies-et-corriges" },
  { icon: "📊", title: "Rapports jury", desc: "Conseils", url: "https://www.fonction-publique.gouv.fr/devenir-agent-public/les-rapports-de-jury" },
  { icon: "📖", title: "Note cadrage", desc: "Attendus", url: "https://ira-gestion.fonction-publique.gouv.fr/userfiles/promotion/12/note-de-cadrage-cas-pratique.pdf" },
  { icon: "🖥️", title: "Mentor", desc: "Formation gratuite", url: "https://mentor.gouv.fr" },
  { icon: "📰", title: "Vie Publique", desc: "Fiches", url: "https://www.vie-publique.fr" }
];

// ===== STATE =====
let state = JSON.parse(localStorage.getItem('forge-ira-v4') || '{}');
if (!state.scores) state.scores = {};
if (!state.done) state.done = {};
if (!state.read) state.read = {};
if (!state.exams) state.exams = {};
if (!state.unlocked) state.unlocked = false;
function save() { localStorage.setItem('forge-ira-v4', JSON.stringify(state)); }

let currentView = 'revisions';
let openFiche = null;
let currentQuiz = null, quizQ = [], quizIdx = 0, quizScore = 0, quizAnswered = false;
let currentExam = null, timerSec = 0, timerRunning = false, timerInt = null;
let examScores = {};

// ===== NAVIGATION - SIMPLIFIÉE =====
function goTo(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + view).classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(view).classList.add('active');
  render();
}

function render() {
  if (currentView === 'revisions') renderRevisions();
  if (currentView === 'quiz') renderQuiz();
  if (currentView === 'exam') renderExam();
  if (currentView === 'liens') renderLiens();
}

// ===== REVISIONS =====
function renderRevisions() {
  let html = '';
  FICHES.forEach(f => {
    const isOpen = openFiche === f.id;
    html += `<div class="fiche">
      <div class="fiche-header" style="border-left-color:${f.color}" onclick="toggleFiche('${f.id}')">
        <span class="fiche-icon">${f.icon}</span>
        <div class="fiche-info"><div class="fiche-title">${f.title}</div><div class="fiche-subtitle">${f.subtitle}</div></div>
        <span class="fiche-toggle">${isOpen ? '▲' : '▼'}</span>
      </div>
      <div class="fiche-body ${isOpen ? 'open' : ''}">
        ${f.sections.map(s => `<h4 style="margin:16px 0 8px;color:var(--accent2)">${s.title}</h4><div class="fiche-content">${s.content}</div>`).join('')}
        <button class="btn ${state.read[f.id] ? 'btn-success' : 'btn-primary'}" onclick="markRead('${f.id}')" style="margin-top:16px">${state.read[f.id] ? '✓ Lue' : 'Marquer lue'}</button>
      </div>
    </div>`;
  });
  document.getElementById('revisions').innerHTML = html;
}

function toggleFiche(id) { openFiche = openFiche === id ? null : id; renderRevisions(); }
function markRead(id) { state.read[id] = true; save(); renderRevisions(); }

// ===== QUIZ =====
function renderQuiz() {
  let html = `<div class="card"><div class="card-title">🎯 Quiz intensif — 12 questions/thème</div>
    <div class="card-subtitle">Valide 70% pour débloquer les épreuves</div><div class="phase-list">`;
  Object.keys(QUIZ).forEach(k => {
    const q = QUIZ[k], total = q.questions.length, score = state.scores[k] || 0, done = state.done[k];
    const pct = done ? Math.round(score/total*100) : 0;
    const read = state.read[k];
    html += `<div class="phase-item ${done ? 'done' : ''} ${!read ? 'locked' : ''}" onclick="${read ? `startQuiz('${k}')` : ''}">
      <span class="phase-icon">${q.icon}</span>
      <div class="phase-info"><div class="phase-name">${q.name}</div>
      <div class="phase-desc">${!read ? '🔒 Lis la fiche d\'abord' : (done ? `${score}/${total} (${pct}%)` : `${total} questions`)}</div></div>
      <span>${!read ? '🔒' : (done ? (pct >= 70 ? '✅' : '🔄') : '▶️')}</span>
    </div>`;
  });
  html += '</div></div>';
  document.getElementById('quiz').innerHTML = html;
}

function startQuiz(k) {
  currentQuiz = k;
  quizQ = [...QUIZ[k].questions].sort(() => Math.random() - 0.5);
  quizIdx = quizScore = 0;
  quizAnswered = false;
  showQuestion();
  document.getElementById('quizModal').classList.add('open');
}

function showQuestion() {
  const q = quizQ[quizIdx];
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-header"><span class="quiz-progress">${quizIdx+1}/${quizQ.length}</span><span class="quiz-theme">${QUIZ[currentQuiz].name}</span></div>
    <div class="quiz-question">${q.q}</div>
    ${q.o.map((opt, i) => `<button class="quiz-opt" onclick="answer(${i})">${opt}</button>`).join('')}
    <div id="feedback"></div>`;
}

function answer(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQ[quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((b, j) => {
    b.style.pointerEvents = 'none';
    if (j === q.a) b.classList.add('correct');
    if (j === i && i !== q.a) b.classList.add('wrong');
  });
  if (i === q.a) quizScore++;
  document.getElementById('feedback').innerHTML = `
    <div class="quiz-feedback ${i === q.a ? 'correct' : 'wrong'}">
      <strong>${i === q.a ? '✓ Correct !' : '✗ Incorrect'}</strong><br>${q.t}
      ${q.d ? `<div class="detail">${q.d}</div>` : ''}
    </div>
    <button class="btn btn-primary" onclick="nextQ()" style="margin-top:12px">${quizIdx < quizQ.length - 1 ? 'Suivant →' : 'Résultat'}</button>`;
}

function nextQ() {
  quizIdx++;
  quizAnswered = false;
  if (quizIdx >= quizQ.length) {
    const total = quizQ.length, pct = Math.round(quizScore/total*100);
    state.scores[currentQuiz] = quizScore;
    state.done[currentQuiz] = true;
    save();
    document.getElementById('quizContent').innerHTML = `
      <div class="result-card">
        <div class="result-score ${pct >= 70 ? 'pass' : 'fail'}">${quizScore}/${total}</div>
        <p style="color:var(--muted);margin:16px 0">${pct}% — ${pct >= 70 ? '✅ Validé !' : '70% requis'}</p>
        <button class="btn btn-primary" onclick="closeQuiz()">Fermer</button>
        ${pct < 70 ? `<button class="btn btn-outline" onclick="startQuiz('${currentQuiz}')">Réessayer</button>` : ''}
      </div>`;
  } else showQuestion();
}

function closeQuiz() { document.getElementById('quizModal').classList.remove('open'); renderQuiz(); }

// ===== EXAM =====
function renderExam() {
  // Vérifier si tous quiz validés à 70%
  const allPassed = Object.keys(QUIZ).every(k => state.done[k] && (state.scores[k] / QUIZ[k].questions.length) >= 0.7);
  const canAccess = allPassed || state.unlocked;
  
  let html = '';
  
  // Si épreuve en cours
  if (currentExam) {
    const exam = EXAMS.find(e => e.id === currentExam);
    const h = Math.floor(timerSec / 3600), m = Math.floor((timerSec % 3600) / 60), s = timerSec % 60;
    html = `
      <div class="timer-box">
        <div class="timer-label">${exam.title}</div>
        <div class="timer-display">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
        <div class="timer-controls">
          <button class="timer-btn ${timerRunning ? 'timer-pause' : 'timer-start'}" onclick="toggleTimer()">${timerRunning ? '⏸ Pause' : '▶ Reprendre'}</button>
          <button class="timer-btn" style="background:var(--danger);color:#fff" onclick="finishExam()">✓ Terminer</button>
        </div>
      </div>
      <div class="card"><div class="card-title">📝 Checklist</div><div class="checklist">
        <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span>Introduction</span></div>
        <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span>Diagnostic</span></div>
        <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span>Propositions</span></div>
        <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span>Annexe 1</span></div>
        <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span>Annexe 2</span></div>
        <div class="check-item" onclick="this.classList.toggle('done')"><div class="check-box">✓</div><span>Relecture</span></div>
      </div></div>`;
  }
  // Si pas accès
  else if (!canAccess) {
    html = `<div class="alert alert-warning"><span>🔒</span><span>Valide les quiz à 70% ou débloque manuellement</span></div>
      <div class="card"><div class="card-title">📊 Progression quiz</div><div class="checklist">`;
    Object.keys(QUIZ).forEach(k => {
      const q = QUIZ[k], s = state.scores[k] || 0, t = q.questions.length;
      const ok = state.done[k] && (s/t) >= 0.7;
      html += `<div class="check-item ${ok ? 'done' : ''}" onclick="goTo('quiz')"><div class="check-box">${ok ? '✓' : ''}</div><span>${q.icon} ${q.name} ${state.done[k] ? `(${Math.round(s/t*100)}%)` : ''}</span></div>`;
    });
    html += `</div><button class="btn btn-danger" onclick="forceUnlock()" style="margin-top:16px">🔓 Débloquer les épreuves</button></div>`;
  }
  // Accès OK
  else {
    html = `<div class="alert alert-success"><span>✅</span><span>Accès débloqué aux épreuves !</span></div>
      <div class="card"><div class="card-title">⏱️ Épreuves chronométrées (4h)</div><div class="card-subtitle">Télécharge le PDF puis lance le timer</div>`;
    EXAMS.forEach(exam => {
      const done = state.exams[exam.id];
      html += `
        <div class="phase-item ${done ? 'done' : ''}" style="margin-bottom:8px">
          <span class="phase-icon">📄</span>
          <div class="phase-info"><div class="phase-name">${exam.title}</div>
          <div class="phase-desc">${exam.subject}${done ? ` • ${done}/20` : ''}</div></div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <a href="${exam.url}" target="_blank" class="btn btn-outline" style="flex:1;text-align:center;text-decoration:none;padding:12px;font-size:12px">📥 PDF</a>
          <button class="btn btn-warning" style="flex:1;font-size:12px" onclick="startExam('${exam.id}')">⏱️ Démarrer</button>
        </div>`;
    });
    html += '</div>';
  }
  
  document.getElementById('exam').innerHTML = html;
}

function forceUnlock() {
  if (confirm("Débloquer les épreuves sans valider les quiz ?")) {
    state.unlocked = true;
    save();
    renderExam();
  }
}

function startExam(id) {
  currentExam = id;
  timerSec = 0;
  timerRunning = true;
  examScores = {};
  timerInt = setInterval(() => {
    if (timerRunning) { timerSec++; renderExam(); }
    if (timerSec >= 4*60*60) finishExam();
  }, 1000);
  renderExam();
}

function toggleTimer() { timerRunning = !timerRunning; renderExam(); }

function finishExam() {
  clearInterval(timerInt);
  timerRunning = false;
  showCorrection();
}

function showCorrection() {
  let html = `<div style="text-align:center;margin-bottom:16px"><div style="font-size:32px">📋</div><h3>Correction jury</h3></div>`;
  JURY.forEach(c => {
    const s = examScores[c.id] ?? -1;
    html += `<div class="criteria-item"><div class="criteria-header">
      <span class="criteria-name">${c.name}</span>
      <div class="criteria-score">${[0,1,2].map(v => `<button class="score-btn ${s===v?'active':''}" onclick="setScore('${c.id}',${v})">${v}</button>`).join('')}</div>
    </div></div>`;
  });
  html += `<button class="btn btn-success" onclick="calcScore()" style="margin-top:16px">📊 Calculer</button>
    <button class="btn btn-outline" onclick="cancelCorrection()">Annuler</button>`;
  document.getElementById('correctionContent').innerHTML = html;
  document.getElementById('correctionModal').classList.add('open');
}

function setScore(id, v) { examScores[id] = v; showCorrection(); }

function calcScore() {
  if (!JURY.every(c => examScores[c.id] >= 0)) { alert('Évalue tous les critères !'); return; }
  let total = 0;
  JURY.forEach(c => total += examScores[c.id]);
  state.exams[currentExam] = total;
  save();
  
  document.getElementById('correctionContent').innerHTML = `
    <div class="result-card">
      <div class="result-score ${total >= 10 ? 'pass' : 'fail'}">${total}/20</div>
      <p style="color:var(--muted);margin:16px 0">${total < 5 ? '⛔ Éliminatoire' : (total < 10 ? '📚 Sous la moyenne' : '✅ Validé')}</p>
      <button class="btn btn-primary" onclick="closeCorrection()">Terminer</button>
    </div>`;
}

function cancelCorrection() { closeCorrection(); }
function closeCorrection() {
  currentExam = null;
  timerSec = 0;
  document.getElementById('correctionModal').classList.remove('open');
  renderExam();
}

// ===== LIENS =====
function renderLiens() {
  let html = '<div class="card"><div class="card-title">🔗 Ressources officielles</div>';
  LIENS.forEach(l => {
    html += `<a href="${l.url}" target="_blank" class="link-item">
      <span class="link-icon">${l.icon}</span>
      <div class="link-info"><div class="link-title">${l.title}</div><div class="link-desc">${l.desc}</div></div>
      <span>→</span>
    </a>`;
  });
  html += '</div>';
  
  // Bouton reset
  html += `<div class="card"><div class="card-title">⚙️ Paramètres</div>
    <button class="btn btn-danger" onclick="resetAll()">🔄 Réinitialiser toute la progression</button>
  </div>`;
  
  document.getElementById('liens').innerHTML = html;
}

function resetAll() {
  if (confirm("Effacer toute ta progression ?")) {
    localStorage.removeItem('forge-ira-v4');
    location.reload();
  }
}

// ===== INIT =====
function init() {
  const days = Math.ceil((new Date('2026-04-21T08:00:00') - new Date()) / (1000*60*60*24));
  document.getElementById('daysLeft').textContent = days > 0 ? days : '0';
  render();
}
init();
</script>
</body>
</html>
